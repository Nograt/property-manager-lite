<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proprty menager</title>
</head>
<body>
<h1>Property Manager Lite</h1>

<section>
  <h2>Assign tenant</h2>

  <select id="propertySelect"></select>
  <select id="tenantSelect"></select>

  <button id="assignTenant">Przypisz najemcę</button>
</section>
<p id="message"></p>

<section>
  <h2>Add property</h2>

  <input id="propertyName" placeholder="Property name">
  <input id="propertyAddress" placeholder="Address">
  <input id="propertyRent" type="number" placeholder="Monthly rent">

  <button id="addProperty">Add property</button>
</section>

<section>
  <h2>Add tenant</h2>

  <input id="tenantName" placeholder="Full name">
  <input id="tenantPhone" placeholder="Phone">
  <input id="tenantEmail" placeholder="Email">

  <button id="addTenant">Add tenant</button>
</section>

<section>
  <h2>Dashboard</h2>

  <div style="display: flex; gap: 10px;">
    <p>Wszystkie nieruchomości: <span id="totalProperties">0</span></p>
    <p>Zajęte nieruchomości: <span id="occupiedProperties">0</span></p>
    <p>Wolne nieruchomości: <span id="freeProperties">0</span></p>
    <p>Suma czynszów: <span id="totalRent">0</span> zł</p>
  </div>
</section>

<section>
  <h2>Properties</h2>

  <hr>
  <h4>Filter properties</h4>
  
  <button id="showAllProperties">Wszystkie</button>
  <button id="showFreeProperties">Wolne</button>
  <button id="showOccupiedProperties">Zajęte</button>
    <br><br>
    <hr>
  <div id="propertiesList"></div>
</section>

<section>
  <h2>Tenants</h2>
  <div id="tenantsList"></div>
</section>



<script src="script.js"></script>
</body>
</html>
